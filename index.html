<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f6eee4">
  <meta
    name="description"
    content="手机端情绪、躯体感受与日常项目记录工具，支持快速记录、引导记录、统计与文字导出。"
  >
  <title>心绪记录</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>

  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>心绪记录</h1>
      </div>
    </header>

    <main class="main-content">
      <section class="screen active" id="screen-home" aria-label="首页">
        <div class="card home-primary-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">EMOTIONS</p>
              <h2>情绪记录</h2>
            </div>
          </div>

          <div class="field-panel">
            <div class="field-header">
              <h3>情绪</h3>
            </div>
            <div id="quick-emotion-selected" class="selected-strip"></div>
            <div class="input-shell">
              <input
                id="quick-emotion-input"
                type="text"
                autocomplete="off"
                placeholder="如：伤心、麻木、安心、委屈"
              >
            </div>
            <div id="quick-emotion-suggestions" class="suggestion-list"></div>
            <div id="quick-emotion-creator" class="inline-creator-host"></div>
          </div>

          <div class="field-panel">
            <div class="field-header">
              <h3>躯体感受</h3>
            </div>
            <div id="quick-somatic-selected" class="selected-strip"></div>
            <div class="input-shell">
              <input
                id="quick-somatic-input"
                type="text"
                autocomplete="off"
                placeholder="如：胸口发紧、头皮发麻、肩膀很紧"
              >
            </div>
            <div id="quick-somatic-suggestions" class="suggestion-list"></div>
            <div id="quick-somatic-creator" class="inline-creator-host"></div>
          </div>

          <div class="form-block">
            <label class="field-label" for="quick-note">补充说明</label>
            <textarea
              id="quick-note"
              class="note-textarea"
              rows="3"
              placeholder="如果你愿意，可以补充这一刻发生了什么。"
            ></textarea>
          </div>

          <div class="save-row">
            <button class="primary-button" id="save-quick-btn" type="button">保存记录</button>
          </div>
        </div>

        <div class="card home-secondary-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">PROJECTS</p>
              <h2>其他项目记录</h2>
            </div>
          </div>
          <p class="body-copy">
            你也可以记录学习、饮食、社交、睡眠等与状态有关的内容。每保存一次，都会生成一条独立记录。
          </p>

          <div id="other-records-selected" class="entry-strip"></div>

          <div class="form-block">
            <label class="field-label" for="other-project-input">项目</label>
            <div class="input-shell">
              <input
                id="other-project-input"
                type="text"
                autocomplete="off"
                placeholder="选择或输入项目，例如：学习、饭量、社交"
              >
            </div>
            <div id="other-project-suggestions" class="suggestion-list"></div>
            <div id="other-project-creator" class="inline-creator-host"></div>
          </div>

          <div class="form-block">
            <label class="field-label" for="other-tag-input">标签</label>
            <div class="input-shell">
              <input
                id="other-tag-input"
                type="text"
                autocomplete="off"
                placeholder="选择该项目下的标签，例如：数学、英语、语文"
              >
            </div>
            <div id="other-tag-suggestions" class="suggestion-list"></div>
            <div id="other-tag-creator" class="inline-creator-host"></div>
          </div>

          <div class="form-block">
            <label class="field-label" for="other-note">补充说明</label>
            <textarea
              id="other-note"
              class="note-textarea"
              rows="3"
              placeholder="例如：今天写了一个小时的数学题。"
            ></textarea>
          </div>

          <div class="save-row">
            <button class="secondary-button" id="add-other-entry-btn" type="button">添加这一条其他项目</button>
          </div>
        </div>

        <div class="hero-card home-summary-card">
          <div>
            <p class="eyebrow">RHYTHM</p>
            <h2>先留下此刻，再慢慢回看变化</h2>
            <p class="hero-copy">
              当记录变得更轻、更快，你会更容易捕捉到真实的波动与变化。持续几天后，再回头看也会更清楚。
            </p>
          </div>
          <div class="hero-stats">
            <div class="hero-pill">
              <span>今天</span>
              <strong id="today-label">--</strong>
            </div>
            <div class="hero-pill locked">
              <span>当前时段</span>
              <strong id="current-slot-label">--</strong>
            </div>
            <div class="hero-pill">
              <span>最近一周</span>
              <strong id="weekly-count-label">0 次</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="screen-guided" aria-labelledby="guided-title">
        <h2 id="guided-title" class="visually-hidden">心绪记录</h2>

        <div class="card">
          <div class="stepper" id="guided-stepper"></div>
          <div id="guided-step-content" class="guided-content"></div>
          <div class="step-actions">
            <button class="ghost-button" id="guided-reset-btn" type="button">重置引导</button>
            <button class="ghost-button" id="guided-prev-btn" type="button">上一步</button>
            <button class="secondary-button" id="guided-next-btn" type="button">下一步</button>
            <button class="primary-button hidden" id="guided-save-btn" type="button">保存记录</button>
          </div>
        </div>
      </section>

      <section class="screen" id="screen-stats" aria-labelledby="stats-title">
        <div class="card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Insights</p>
              <h2 id="stats-title">最近的变化</h2>
            </div>
          </div>
          <div class="segmented-control" id="stats-range-selector">
            <button type="button" class="segmented-button active" data-range="7d">近 7 天</button>
            <button type="button" class="segmented-button" data-range="30d">近 30 天</button>
            <button type="button" class="segmented-button" data-range="all">全部</button>
          </div>
          <div id="stats-summary" class="summary-grid"></div>
        </div>

        <div class="card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">EMOTIONS</p>
              <h3>常见情绪标签</h3>
            </div>
          </div>
          <div class="chart-row">
            <div class="donut-wrap">
              <div id="emotion-donut" class="donut-chart empty"></div>
              <div id="emotion-center-label" class="donut-center-label">暂无情绪数据</div>
            </div>
            <div id="emotion-legend" class="stats-tag-grid"></div>
          </div>
        </div>

        <div class="card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Somatic Clues</p>
              <h3>常见躯体感受</h3>
            </div>
          </div>
          <div class="chart-row">
            <div class="donut-wrap">
              <div id="somatic-donut" class="donut-chart empty"></div>
              <div id="somatic-center-label" class="donut-center-label">暂无躯体数据</div>
            </div>
            <div id="somatic-legend" class="stats-tag-grid"></div>
          </div>
        </div>
      </section>

      <section class="screen" id="screen-recent" aria-labelledby="recent-title">
        <div class="card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Recent</p>
              <h2 id="recent-title">最近记录</h2>
            </div>
          </div>
          <div id="recent-records" class="record-list"></div>
        </div>
      </section>

      <section class="screen" id="screen-settings" aria-labelledby="settings-title">
        <h2 id="settings-title" class="visually-hidden">设置</h2>
        <div id="settings-view" class="settings-view"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-button active" type="button" data-screen="home">
        <span>首页</span>
      </button>
      <button class="nav-button" type="button" data-screen="guided">
        <span>引导</span>
      </button>
      <button class="nav-button" type="button" data-screen="stats">
        <span>统计</span>
      </button>
      <button class="nav-button" type="button" data-screen="recent">
        <span>最近</span>
      </button>
      <button class="nav-button" type="button" data-screen="settings">
        <span>设置</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
